<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar Sheet Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f2efe7;
        --paper: #fffdf8;
        --ink: #1a2432;
        --line: #d6d2c8;
        --brand: #1a7a5e;
        --brand-strong: #0d5c45;
        --accent: #e8662f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 12%, #ffe6ce 0, transparent 34%),
          radial-gradient(circle at 88% 8%, #d8f2e7 0, transparent 30%),
          linear-gradient(165deg, #f2efe7 0%, #ece6da 100%);
        font-family: "Manrope", sans-serif;
      }

      .shell {
        min-height: 100vh;
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 14px;
      }

      .masthead {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: end;
        gap: 10px;
      }

      .title {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(1.2rem, 2vw, 1.8rem);
        font-weight: 700;
        letter-spacing: 0.01em;
        margin: 0;
      }

      .subtitle {
        margin: 4px 0 0;
        font-size: 0.92rem;
        opacity: 0.82;
      }

      .bar {
        background: color-mix(in srgb, var(--paper) 92%, white 8%);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        box-shadow: 0 12px 30px rgba(15, 38, 31, 0.08);
      }

      button,
      input {
        border-radius: 10px;
        border: 1px solid var(--line);
        font: inherit;
      }

      button {
        padding: 9px 12px;
        background: #ffffff;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(26, 36, 50, 0.12);
      }

      button.primary {
        color: white;
        border-color: transparent;
        background: linear-gradient(120deg, var(--brand), var(--brand-strong));
      }

      button.secondary {
        border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      }

      input {
        min-width: 140px;
        padding: 9px 10px;
        background: #fff;
      }

      .status {
        margin-left: auto;
        font-size: 0.86rem;
        background: #fff;
        border: 1px dashed var(--line);
        border-radius: 999px;
        padding: 6px 12px;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        gap: 12px;
      }

      .panel {
        background: color-mix(in srgb, var(--paper) 94%, white 6%);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
        animation: rise 260ms ease both;
      }

      .panel h2 {
        margin: 0;
        padding: 10px 12px;
        font-size: 0.95rem;
        letter-spacing: 0.02em;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.06));
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }

      .mini {
        font-size: 0.8rem;
        opacity: 0.74;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1020px) {
        .grid {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(320px, 1fr) minmax(320px, 1fr);
        }

        .status {
          margin-left: 0;
          width: 100%;
        }
      }
      .modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }

      .modal.open {
        display: flex;
      }

      .modal-content {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        max-width: 480px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .modal-content h3 {
        margin: 0 0 16px;
        font-size: 1.2rem;
      }

      .modal-content label {
        display: block;
        margin: 12px 0 4px;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .modal-content input, .modal-content textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        box-sizing: border-box;
      }

      .modal-content textarea {
        resize: vertical;
        min-height: 60px;
      }

      .modal-buttons {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }

      .modal-buttons button {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: white;
        cursor: pointer;
      }

      .modal-buttons button.primary {
        background: var(--brand);
        color: white;
        border-color: var(--brand);
      }    </style>
  </head>
  <body>
    <div class="shell">
      <header class="masthead">
        <div>
          <h1 class="title">Calendar + Sheet Control Room</h1>
          <p class="subtitle">One page to edit schedule and export results.</p>
        </div>
        <span class="mini" id="now"></span>
      </header>

      <section class="bar">
        <button class="primary" id="btnWeekly">Export weekly mode</button>
        <button id="btnMonthCurrent">Export full current month</button>
        <input id="monthInput" placeholder="MM/YYYY" />
        <button class="secondary" id="btnMonthCustom">Export by month</button>
        <button id="btnCreateEvent">Create event</button>
        <button id="btnRefresh">Refresh views</button>
        <span class="status" id="status">Ready</span>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Calendar</h2>
          <iframe id="calendarFrame" title="calendar"></iframe>
        </article>
        <article class="panel">
          <h2>Sheet</h2>
          <iframe id="sheetFrame" title="sheet"></iframe>
        </article>
      </section>
    </div>

    <script>
      const state = {
        token: new URLSearchParams(location.search).get("token") || "",
      };

      const nowEl = document.getElementById("now");
      const statusEl = document.getElementById("status");
      const calendarFrame = document.getElementById("calendarFrame");
      const sheetFrame = document.getElementById("sheetFrame");

      function tickNow() {
        nowEl.textContent = new Date().toLocaleString();
      }
      setInterval(tickNow, 1000);
      tickNow();

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      async function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };

        if (state.token) {
          headers.Authorization = `Bearer ${state.token}`;
        }

        const res = await fetch(path, {
          method: options.method || "GET",
          headers,
          body: options.body ? JSON.stringify(options.body) : undefined,
        });

        const json = await res.json();
        if (!res.ok || !json.ok) {
          throw new Error(json.error || "Request failed");
        }
        return json;
      }

      function renderResult(payload) {
        const r = payload.result;
        setStatus(
          `Done | ${r.mode} | rows ${r.rowsUpdated}, new ${r.newRows}, events ${r.eventsFetched}, sheet ${r.sheetName}`
        );
      }

      async function loadConfig() {
        setStatus("Loading config...");
        const cfg = await api("/api/config");
        calendarFrame.src = cfg.calendarEmbedUrl;
        sheetFrame.src = cfg.sheetEmbedUrl;
        setStatus("Ready");
      }

      document.getElementById("btnWeekly").addEventListener("click", async () => {
        try {
          setStatus("Running weekly export...");
          renderResult(await api("/api/export/weekly-current", { method: "POST" }));
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        }
      });

      document.getElementById("btnMonthCurrent").addEventListener("click", async () => {
        try {
          setStatus("Running full current month export...");
          renderResult(await api("/api/export/month-current", { method: "POST" }));
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        }
      });

      document.getElementById("btnMonthCustom").addEventListener("click", async () => {
        try {
          const month = document.getElementById("monthInput").value.trim();
          setStatus(`Running full export for ${month}...`);
          renderResult(
            await api("/api/export/month-custom", {
              method: "POST",
              body: { month },
            })
          );
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        }
      });

      document.getElementById("btnRefresh").addEventListener("click", () => {
        calendarFrame.src = calendarFrame.src;
        sheetFrame.src = sheetFrame.src;
        setStatus("Views refreshed");
      });

      setInterval(async () => {
        try {
          const status = await api("/api/status");
          if (status.lastRun && status.lastRun.finishedAt) {
            const t = new Date(status.lastRun.finishedAt).toLocaleTimeString();
            const marker = status.lastRun.ok ? "last ok" : "last error";
            statusEl.title = `${marker} at ${t}`;
          }
        } catch (_e) {
          // noop
        }
      }, 6000);

      const modal = document.getElementById("createEventModal");
      const btnCreateEvent = document.getElementById("btnCreateEvent");
      const modalCancel = document.getElementById("modalCancel");
      const modalSubmit = document.getElementById("modalSubmit");

      function setupCreateEventModal() {
        if (!modal || !btnCreateEvent || !modalCancel || !modalSubmit) {
          console.error("Modal elements not found:", { modal, btnCreateEvent, modalCancel, modalSubmit });
          return;
        }

        btnCreateEvent.addEventListener("click", () => {
          modal.classList.add("open");
        });

        modalCancel.addEventListener("click", () => {
          modal.classList.remove("open");
        });

        modal.addEventListener("click", (e) => {
          if (e.target === modal) {
            modal.classList.remove("open");
          }
        });

        modalSubmit.addEventListener("click", async () => {
          try {
            const title = document.getElementById("eventTitle").value.trim();
            const startTime = document.getElementById("eventStart").value;
            const endTime = document.getElementById("eventEnd").value;
            const description = document.getElementById("eventDesc").value.trim();

            if (!title || !startTime || !endTime) {
              setStatus("Error: Fill all required fields");
              return;
            }

            setStatus("Creating event...");
            const result = await api("/api/events/create", {
              method: "POST",
              body: { title, startTime, endTime, description },
            });

            setStatus(`Event created: ${result.result.eventTitle}`);
            modal.classList.remove("open");

            document.getElementById("eventTitle").value = "";
            document.getElementById("eventStart").value = "";
            document.getElementById("eventEnd").value = "";
            document.getElementById("eventDesc").value = "";

            setTimeout(() => {
              calendarFrame.src = calendarFrame.src;
            }, 1000);
          } catch (err) {
            setStatus(`Error: ${err.message}`);
          }
        });
      }

      // Setup modal event listeners
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", setupCreateEventModal);
      } else {
        setupCreateEventModal();
      }

      loadConfig().catch((err) => setStatus(`Error: ${err.message}`));
    </script>

    <div id="createEventModal" class="modal">
      <div class="modal-content">
        <h3>Create Calendar Event</h3>
        <label>Event Title *</label>
        <input id="eventTitle" type="text" placeholder="Event name" />

        <label>Start Time *</label>
        <input id="eventStart" type="datetime-local" />

        <label>End Time *</label>
        <input id="eventEnd" type="datetime-local" />

        <label>Description</label>
        <textarea id="eventDesc" placeholder="Optional event description"></textarea>

        <div class="modal-buttons">
          <button id="modalCancel">Cancel</button>
          <button id="modalSubmit" class="primary">Create</button>
        </div>
      </div>
    </div>
  </body>
</html>
