name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      APP_NAME: ${{ vars.APP_NAME || 'calendar-sheet-manager' }}
      APP_PORT: ${{ vars.APP_PORT || '8080' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load SSH private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        run: |
          rsync -az \
            --exclude node_modules \
            --exclude .git \
            --exclude .github \
            --exclude .env \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Run deploy script on VPS
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_APP_DIR' APP_NAME='$APP_NAME' PORT='$APP_PORT' bash '$VPS_APP_DIR/scripts/deploy_remote.sh'"
